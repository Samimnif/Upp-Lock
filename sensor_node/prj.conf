CONFIG_SERIAL=y
CONFIG_UART_INTERRUPT_DRIVEN=y

# Console via USB (printk output visible over USB serial)
CONFIG_USB_DEVICE_STACK=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y

#i2c
CONFIG_I2C=y

CONFIG_SENSOR=y

CONFIG_ADC=y
CONFIG_SENSOR=y

# Logging
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3

# Reboot support (used for CMD_RESET)
CONFIG_REBOOT=y

# Stack/heap tuning for RP2350
CONFIG_MAIN_STACK_SIZE=2048
CONFIG_HEAP_MEM_POOL_SIZE=2048

# GPIO status peripherals
CONFIG_GPIO=y
CONFIG_LED_STRIP=y
